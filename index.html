<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmoteca</title>
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen" class="overlay">
        <div class="login-box">
            <img src="logo.svg" alt="Logo" width="150">
            <h2>Acesso Restrito</h2>
            <input type="text" id="username" placeholder="Usuário">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="checkLogin()">Entrar</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <div id="main-content" class="hidden">
        <header>
    <div class="header-content">
        <!-- Parte 1: Logo -->
        <div class="logo-area">
            <span class="logo-text">FILMOTECA</span>
        </div>

        <!-- Parte 2: Pesquisa (Centro) -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Buscar filmes ou categorias...">
            <button id="search-btn">🔍</button>
        </div>

        <!-- Parte 3: Logout (Direita) -->
        <div class="user-menu">
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>
</header>



        <main>
            <section id="categories-container"></section>
        </main>

        <!-- Player Modal -->
        <div id="player-modal" class="overlay hidden">
            <div class="modal-content">
                <button class="close-modal" onclick="closePlayer()">×</button>
                <div id="video-wrapper"></div>
                <h2 id="modal-title"></h2>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
